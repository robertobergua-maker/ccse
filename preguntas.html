<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de preguntas - CCSE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container detail-container">
        <header>
            <div>
                <h1 id="detail-title">Detalle de preguntas</h1>
                <p id="detail-summary" class="muted">Cargando datos…</p>
            </div>
            <a href="dashboard.html" class="btn btn-secondary">Volver al panel</a>
        </header>

        <main>
            <nav class="filter-nav" aria-label="Filtros de preguntas">
                <a href="?filtro=todas">Todas</a>
                <a href="?filtro=respondidas">Respondidas</a>
                <a href="?filtro=no-respondidas">No respondidas</a>
                <a href="?filtro=acertadas">Acertadas</a>
                <a href="?filtro=falladas">Falladas</a>
            </nav>

            <div class="table-scroll">
                <table class="questions-table">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Pregunta</th>
                            <th>Tarea</th>
                            <th>Veces respondida</th>
                            <th>Aciertos</th>
                            <th>Fallos</th>
                            <th>Último resultado</th>
                        </tr>
                    </thead>
                    <tbody id="questions-body">
                        <tr><td colspan="7" class="empty-state">Cargando preguntas…</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/preguntas.js"></script>
</body>
</html>
