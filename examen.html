<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulacro de Examen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f5f7fb; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: white; border-bottom: 1px solid #e2e8f0; }
        h1 { margin: 0; font-size: 20px; color: #1a365d; }
        
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .btn-inicio { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; background-color: #edf2f7; color: #4a5568; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .btn-inicio:hover { background-color: #e2e8f0; }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .info-bar { display: flex; justify-content: space-between; background: #2b6cb0; color: white; padding: 15px 20px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        
        .question-block { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        .question-block h2 { font-size: 18px; color: #1a365d; }
        .question-code { color: #718096; font-size: 13px; margin-left: 8px; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .option { padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .option:hover { background-color: #f7fafc; }
        .option.selected { background-color: #ebf8ff; border-color: #4299e1; font-weight: 600; }
        
        .btn-submit { display: block; width: 100%; padding: 15px; background-color: #e53e3e; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn-submit:hover { background-color: #c53030; }
    </style>
</head>
<body>

    <header>
        <h1>Examen en Curso</h1>
        <div class="nav-actions">
            <a href="dashboard.html" class="btn-inicio">🏠 Abandonar e Inicio</a>
        </div>
    </header>

    <div class="container">
        <div class="info-bar">
            <span>Modo: Simulacro Oficial</span>
            <span>Tiempo restante: <span id="timer">45:00</span></span>
        </div>

        <div id="exam-container">
            <p>Cargando cuestionario adaptado...</p>
        </div>

        <button id="submit-exam-btn" class="btn-submit">Finalizar y Enviar Examen</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/examen.js"></script>
</body>
</html>
