<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados del Examen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f5f7fb; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: white; border-bottom: 1px solid #e2e8f0; }
        h1 { margin: 0; font-size: 20px; color: #1a365d; }
        
        .btn-inicio { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; background-color: #edf2f7; color: #4a5568; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .btn-inicio:hover { background-color: #e2e8f0; }
        
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 30px; font-size: 18px; }
        
        /* Bloque 1: Cuadro resumen */
        .resumen-container { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; margin-top: 15px; }
        .card { flex: 1; min-width: 160px; padding: 20px; border-radius: 8px; text-align: center; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.04); }
        .respondidas { background-color: #3182ce; }
        .no-respondidas { background-color: #718096; }
        .bien { background-color: #38a169; }
        .mal { background-color: #e53e3e; }
        .card span { display: block; font-size: 32px; margin-top: 5px; }

        /* Bloque 2: Tabla agrupada */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.04); border-radius: 8px; overflow: hidden; }
        th, td { padding: 14px; border: 1px solid #e2e8f0; text-align: left; }
        th { background-color: #edf2f7; color: #4a5568; font-weight: 600; }
        tr:hover { background-color: #f7fafc; }
        
        .badge { padding: 5px 10px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; display: inline-block; }
        .center-text { text-align: center; }
        .badge.no-respondidas { background: #718096; }
        .badge.bien { background: #38a169; }
        .badge.mal { background: #e53e3e; }
        .answer-note { color: #4a5568; font-size: 13px; margin-top: 8px; }
        .result-title { padding: 16px; border-radius: 8px; border: 0; }
        .result-title.passed { color: #276749; background: #f0fff4; }
        .result-title.failed { color: #9b2c2c; background: #fff5f5; }
        .result-with-help { display: inline-block; position: relative; outline: none; }
        .result-with-help .badge { cursor: help; }
        .simple-tooltip {
            position: absolute;
            z-index: 20;
            left: 50%;
            bottom: calc(100% + 10px);
            width: 250px;
            transform: translateX(-50%) translateY(5px);
            padding: 10px 12px;
            border-radius: 7px;
            background: #1f2937;
            color: #fff;
            font-size: 13px;
            font-weight: normal;
            line-height: 1.4;
            box-shadow: 0 6px 18px rgba(0,0,0,0.18);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity .15s ease, transform .15s ease;
        }
        .simple-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #1f2937;
        }
        .result-with-help:hover .simple-tooltip,
        .result-with-help:focus .simple-tooltip,
        .result-with-help:focus-within .simple-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <h1>Análisis de Rendimiento</h1>
        <a href="dashboard.html" class="btn-inicio">🏠 Volver a Inicio</a>
    </header>

    <div class="container">
        <h2 id="result-title" class="result-title">Resultado del examen</h2>
        <div class="resumen-container">
            <div class="card respondidas">Respondidas <span id="res-respondadas">0</span></div>
            <div class="card no-respondidas">No Respondidas <span id="res-no-respondidas">0</span></div>
            <div class="card bien">Correctas <span id="res-bien">0</span></div>
            <div class="card mal">Incorrectas <span id="res-mal">0</span></div>
        </div>

        <h2>Detalle del examen</h2>
        <table>
            <thead>
                <tr>
                    <th style="width: 5%" class="center-text">Nº</th>
                    <th style="width: 55%">Pregunta</th>
                    <th style="width: 25%">Tu respuesta</th>
                    <th style="width: 15%">Resultado</th>
                </tr>
            </thead>
            <tbody id="tabla-preguntas-cuerpo">
                <tr>
                    <td colspan="4" style="text-align: center; color: #718096; font-style: italic;">Cargando resultados…</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/results.js"></script>
</body>
</html>
